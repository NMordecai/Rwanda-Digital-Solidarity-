<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDS - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --nav: #0f3b5c;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        .dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --nav: #0f172a;
            --border: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        .navbar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-badge {
            background: #f59e0b;
            color: #0f172a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        #theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 40px;
            background: var(--card);
            min-width: 200px;
            border-radius: 12px;
            z-index: 100;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-content a {
            color: var(--text);
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--info);
        }

        .stat-label {
            color: var(--text-light);
            margin-top: 8px;
        }

        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
        }

        .admin-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .admin-tab.active {
            color: var(--info);
            border-bottom: 2px solid var(--info);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .feedback-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .project-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .user-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .reply-section textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            margin: 10px 0;
            resize: vertical;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--info);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--card);
            margin: 5% auto;
            width: 500px;
            max-width: 90%;
            border-radius: 20px;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-body {
            padding: 24px;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 16px;
            font-size: 24px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            z-index: 2000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            border-left: 4px solid var(--info);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-shield-hooded"></i>
            RDS Admin Portal
            <span class="admin-badge">ADMIN</span>
        </div>
        <div class="nav-right">
            <button id="themeToggle" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
            <div class="user-info">
                <i class="fa-solid fa-user-shield"></i> Admin, <strong id="adminName">Administrator</strong>
                <div class="dropdown">
                    <button class="dropdown-btn" onclick="toggleDropdown()"><i class="fa-solid fa-chevron-down"></i></button>
                    <div class="dropdown-content" id="userDropdown">
                        <a href="#" onclick="showAdminProfile()"><i class="fa-solid fa-id-card"></i> My Profile</a>
                        <hr><a href="#" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalProjects">0</div>
                <div class="stat-label">Active Projects</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalFeedback">0</div>
                <div class="stat-label">Total Feedback</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingFeedback">0</div>
                <div class="stat-label">Pending Replies</div>
            </div>
        </div>

        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('feedback')">📝 Feedback Management</button>
            <button class="admin-tab" onclick="switchTab('projects')">🏗️ Project Management</button>
            <button class="admin-tab" onclick="switchTab('users')">👥 User Management</button>
            <button class="admin-tab" onclick="switchTab('add')">➕ Add New Project</button>
        </div>

        <div id="feedbackTab" class="tab-content active">
            <div id="feedbackList"></div>
        </div>

        <div id="projectsTab" class="tab-content">
            <div id="projectsList"></div>
        </div>

        <div id="usersTab" class="tab-content">
            <div id="usersList"></div>
        </div>

        <div id="addTab" class="tab-content">
            <div class="card" style="padding: 24px;">
                <h3>Add New Project</h3>
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="newProjectName" placeholder="Enter project name">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="newProjectCategory">
                        <option value="tech">Technology</option>
                        <option value="infra">Infrastructure</option>
                        <option value="energy">Energy</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Progress (%)</label>
                    <input type="number" id="newProjectProgress" min="0" max="100" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="newProjectDesc" rows="3" placeholder="Project description"></textarea>
                </div>
                <div class="form-group">
                    <label>Province</label>
                    <input type="text" id="newProjectProvince" placeholder="e.g., Kigali City">
                </div>
                <div class="form-group">
                    <label>Budget</label>
                    <input type="text" id="newProjectBudget" placeholder="e.g., $100M">
                </div>
                <button onclick="addProject()" class="btn btn-primary">Create Project</button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentAdmin = null;
        let projects = [];
        let allUsers = [];
        let allFeedback = [];

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function loadAdminData() {
            const savedUser = localStorage.getItem('rds_current_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return false;
            }
            currentAdmin = JSON.parse(savedUser);
            
            if (currentAdmin.role !== 'admin') {
                window.location.href = 'dashboard.html';
                return false;
            }
            
            document.getElementById('adminName').innerText = currentAdmin.name.split(' ')[0];
            
            // Load projects
            const savedProjects = localStorage.getItem('rds_projects');
            if (savedProjects) {
                projects = JSON.parse(savedProjects);
            } else {
                projects = [
                    { id: '1', name: 'Kigali Innovation City', category: 'tech', progress: 75, description: "Africa's premier tech hub", province: 'Kigali City', color: '#00A1DE', icon: 'fa-microchip', budget: '$150M', startDate: '2022-01-15' },
                    { id: '2', name: 'Bugesera International Airport', category: 'infra', progress: 60, description: 'Modern aviation hub', province: 'Eastern', color: '#007A33', icon: 'fa-plane', budget: '$1.2B', startDate: '2020-06-01' }
                ];
                localStorage.setItem('rds_projects', JSON.stringify(projects));
            }
            
            // Load users
            allUsers = JSON.parse(localStorage.getItem('rds_users')) || [];
            
            // Collect all feedback
            allFeedback = [];
            allUsers.forEach(user => {
                if (user.feedbacks) {
                    user.feedbacks.forEach(f => {
                        allFeedback.push({
                            ...f,
                            userName: user.name,
                            userEmail: user.email
                        });
                    });
                }
            });
            
            updateStats();
            renderFeedbackList();
            renderProjectsList();
            renderUsersList();
            
            return true;
        }

        function updateStats() {
            const pendingCount = allFeedback.filter(f => !f.adminReply).length;
            document.getElementById('totalUsers').innerText = allUsers.length;
            document.getElementById('totalProjects').innerText = projects.length;
            document.getElementById('totalFeedback').innerText = allFeedback.length;
            document.getElementById('pendingFeedback').innerText = pendingCount;
        }

        function renderFeedbackList() {
            const container = document.getElementById('feedbackList');
            const pending = allFeedback.filter(f => !f.adminReply);
            
            if (pending.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-check-circle"></i><p>All feedback has been reviewed!</p></div>';
                return;
            }
            
            container.innerHTML = pending.map((fb, idx) => `
                <div class="feedback-card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <div><strong>${fb.userName}</strong> <span style="color: var(--text-light);">(${fb.userEmail})</span></div>
                        <div><small>${fb.date}</small></div>
                    </div>
                    <div style="margin: 10px 0;"><strong>Project:</strong> ${fb.project}</div>
                    <p>${fb.text}</p>
                    ${fb.rating ? `<div style="color: var(--warning); margin: 8px 0;">Rating: ${'★'.repeat(fb.rating)}${'☆'.repeat(5-fb.rating)}</div>` : ''}
                    <div class="reply-section">
                        <textarea id="reply-${idx}" placeholder="Write your response to ${fb.userName}..." rows="2"></textarea>
                        <button onclick="replyToFeedback('${fb.userEmail}', '${fb.id}', ${idx})" class="btn btn-primary">Send Reply</button>
                    </div>
                </div>
            `).join('');
        }

        function renderProjectsList() {
            const container = document.getElementById('projectsList');
            if (projects.length === 0) {
                container.innerHTML = '<div class="empty-state">No projects yet. Add your first project!</div>';
                return;
            }
            
            container.innerHTML = projects.map(p => `
                <div class="project-card">
                    <div>
                        <i class="fa-solid ${p.icon}" style="color: ${p.color}; font-size: 1.5rem;"></i>
                        <strong>${p.name}</strong>
                        <br><small>${p.province} • ${p.progress}% complete • ${p.category}</small>
                    </div>
                    <div>
                        <button onclick="editProject('${p.id}')" class="btn btn-warning">Edit</button>
                        <button onclick="deleteProject('${p.id}')" class="btn btn-danger">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderUsersList() {
            const container = document.getElementById('usersList');
            const regularUsers = allUsers.filter(u => u.role !== 'admin');
            
            if (regularUsers.length === 0) {
                container.innerHTML = '<div class="empty-state">No regular users yet</div>';
                return;
            }
            
            container.innerHTML = regularUsers.map(u => `
                <div class="user-card">
                    <div>
                        <i class="fa-solid fa-user-circle"></i>
                        <strong>${u.name}</strong>
                        <br><small>${u.email}</small>
                        <br><small>District: ${u.district || 'Not specified'}</small>
                    </div>
                    <div>
                        <span style="color: var(--info);">${u.impactPoints || 0} pts</span>
                        <br><small>${u.feedbacks?.length || 0} reports</small>
                    </div>
                </div>
            `).join('');
        }

        function replyToFeedback(userEmail, feedbackId, idx) {
            const reply = document.getElementById(`reply-${idx}`).value;
            if (!reply) {
                showToast('Please enter a reply', 'error');
                return;
            }
            
            const userIndex = allUsers.findIndex(u => u.email === userEmail);
            if (userIndex !== -1) {
                const feedbackIndex = allUsers[userIndex].feedbacks.findIndex(f => f.id === feedbackId);
                if (feedbackIndex !== -1) {
                    allUsers[userIndex].feedbacks[feedbackIndex].adminReply = reply;
                    allUsers[userIndex].feedbacks[feedbackIndex].replyDate = new Date().toLocaleDateString();
                    localStorage.setItem('rds_users', JSON.stringify(allUsers));
                    
                    showToast('Reply sent successfully!', 'success');
                    
                    // Refresh data
                    allFeedback = [];
                    allUsers.forEach(user => {
                        if (user.feedbacks) {
                            user.feedbacks.forEach(f => {
                                allFeedback.push({ ...f, userName: user.name, userEmail: user.email });
                            });
                        }
                    });
                    updateStats();
                    renderFeedbackList();
                }
            }
        }

        function addProject() {
            const name = document.getElementById('newProjectName').value;
            const category = document.getElementById('newProjectCategory').value;
            const progress = parseInt(document.getElementById('newProjectProgress').value) || 0;
            const description = document.getElementById('newProjectDesc').value;
            const province = document.getElementById('newProjectProvince').value;
            const budget = document.getElementById('newProjectBudget').value;
            
            if (!name || !description || !province) {
                showToast('Please fill all required fields', 'error');
                return;
            }
            
            const colors = { tech: '#00A1DE', infra: '#007A33', energy: '#FF9800' };
            const icons = { tech: 'fa-microchip', infra: 'fa-building', energy: 'fa-bolt' };
            
            const newProject = {
                id: String(projects.length + 1),
                name: name,
                category: category,
                progress: progress,
                description: description,
                province: province,
                budget: budget || 'TBD',
                color: colors[category],
                icon: icons[category],
                startDate: new Date().toISOString().split('T')[0]
            };
            
            projects.push(newProject);
            localStorage.setItem('rds_projects', JSON.stringify(projects));
            
            document.getElementById('newProjectName').value = '';
            document.getElementById('newProjectProgress').value = '';
            document.getElementById('newProjectDesc').value = '';
            document.getElementById('newProjectProvince').value = '';
            document.getElementById('newProjectBudget').value = '';
            
            showToast('Project added successfully!', 'success');
            updateStats();
            renderProjectsList();
        }

        function editProject(projectId) {
            const project = projects.find(p => p.id === projectId);
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="modal-header"><i class="fa-solid fa-pen"></i><h2>Edit Project</h2></div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Project Name</label>
                        <input type="text" id="editName" value="${project.name}" style="width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);">
                    </div>
                    <div class="form-group">
                        <label>Progress (%)</label>
                        <input type="number" id="editProgress" value="${project.progress}" min="0" max="100" style="width:100%; padding:10px; border-radius:8px;">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="editDesc" rows="3" style="width:100%; padding:10px; border-radius:8px;">${project.description}</textarea>
                    </div>
                    <button onclick="updateProject('${projectId}')" class="btn btn-primary">Update</button>
                    <button onclick="closeModal()" class="btn" style="margin-left: 10px;">Cancel</button>
                </div>
            `;
            modal.style.display = 'block';
        }

        function updateProject(projectId) {
            const project = projects.find(p => p.id === projectId);
            const newName = document.getElementById('editName').value;
            const newProgress = parseInt(document.getElementById('editProgress').value);
            const newDesc = document.getElementById('editDesc').value;
            
            if (newName) project.name = newName;
            if (newProgress) project.progress = newProgress;
            if (newDesc) project.description = newDesc;
            
            localStorage.setItem('rds_projects', JSON.stringify(projects));
            showToast('Project updated!', 'success');
            closeModal();
            renderProjectsList();
            updateStats();
        }

        function deleteProject(projectId) {
            if (confirm('Are you sure you want to delete this project? This action cannot be undone.')) {
                projects = projects.filter(p => p.id !== projectId);
                localStorage.setItem('rds_projects', JSON.stringify(projects));
                showToast('Project deleted!', 'success');
                renderProjectsList();
                updateStats();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${tab}Tab`).classList.add('active');
        }

        function showAdminProfile() {
            showToast(`👤 ${currentAdmin.name}\n📧 ${currentAdmin.email}\n👑 Role: Administrator\n📅 Joined: ${new Date(currentAdmin.joinDate).toLocaleDateString()}`, 'info');
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function toggleDropdown() {
            document.getElementById('userDropdown').classList.toggle('show');
        }

        function logout() {
            localStorage.removeItem('rds_current_user');
            window.location.href = 'index.html';
        }

        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-btn')) {
                document.getElementById('userDropdown').classList.remove('show');
            }
            if (event.target === document.getElementById('modal')) {
                closeModal();
            }
        };

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }

        loadAdminData();
    </script>
</body>
</html>
